kind = "web"
previewPath = "/"
title = "OBSIDIAN IDE"
version = "1.0.0"
id = "artifacts/obsidian-ide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21955

[services.development]
run = "pnpm --filter @workspace/obsidian-ide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/obsidian-ide", "run", "build" ]
publicDir = "artifacts/obsidian-ide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21955"
BASE_PATH = "/"
